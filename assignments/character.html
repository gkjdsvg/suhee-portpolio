<!DOCTYPE html>
<html>
<head>
    <title>캐릭터 소개하기</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #333;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        /* 메인 컨테이너 */
        .character-container {
            max-width: 850px;
            margin: 40px auto;
            background: #ffffff;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        /* 상단 프로필 섹션 */
        .profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            margin-bottom: 80px;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 15px 15px 25px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .profile-info {
            text-align: left;
        }

        .profile-info h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .profile-info p {
            font-size: 1.1rem;
            color: #666;
            margin: 5px 0;
        }

        .tag {
            display: inline-block;
            background: #e1f5fe;
            color: #01579b;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, #2ecc71, #f39c12);
            border-radius: 10px;
            margin: 15px 0 25px;
            opacity: 0.7;
        }

        section {
            margin-top: 50px;
        }

        h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '•';
            color: #f39c12;
            font-size: 2rem;
        }

        /* 인간관계 섹션 간격 */
        .relation-set {
            margin-bottom: 100px;
        }

        .relation {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-top: 25px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 20px;
            transition: transform 0.3s ease;
        }

        .relation:hover {
            transform: translateY(-5px);
            background: #fff8f0;
        }

        .relation-img {
            width: 110px;
            height: 110px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 10px 10px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .relation-info strong {
            font-size: 1.2rem;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .relation-info a {
            text-decoration: none;
            color: inherit;
        }

        .relation-info a:hover strong {
            color: #f39c12;
        }

        /* 큰 이미지 및 캡션 스타일 */
        .big-img-wrapper {
            margin-top: 30px;
            text-align: center; /* 캡션 중앙 정렬 */
        }

        .big-img {
            width: 100%;
            height: auto;
            border-radius: 25px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.12);
        }

        .img-caption {
            display: block;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #888;
            font-style: italic; /* 캡션은 이탤릭체로 구분 */
        }

        @media (max-width: 600px) {
            .profile { flex-direction: column; text-align: center; }
            .profile-info { text-align: center; }
            .relation { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<body>
    <div class="character-container">

        <div class="profile">
            <img src="nick.jpg" class="profile-img">
            <div class="profile-info">
                <h1>닉 와일드</h1>
                <p>성별: 남성</p>
                <p>나이: 33세 (주토피아 2 기준)</p>
                <span class="tag">주토피아 최초의 여우 경찰</span>
            </div>
        </div>

        <section>
            <h2>인간 관계</h2>
            <div class="divider"></div>

            <div class="relation-set">
                <div class="relation">
                    <img src="judy.jpg" class="relation-img">
                    <div class="relation-info">
                        <a href="https://namu.wiki/w/%EC%A3%BC%EB%94%94%20%ED%99%89%EC%8A%A4" target="_blank">
                            <strong>주디 홉스</strong>
                        </a>
                        <p>나이: 25세</p>
                        <p>함께 사건을 해결하는 파트너</p>
                    </div>
                </div>
                <div class="big-img-wrapper">
                    <img src="judynick.jpg" class="big-img">
                    <span class="img-caption">▲ 환상의 케미를 자랑하는 주디와 닉의 투샷</span>
                </div>
            </div>

            <div class="relation-set">
                <div class="relation">
                    <img src="flash.jpg" class="relation-img">
                    <div class="relation-info">
                        <a href="https://namu.wiki/w/%ED%94%8C%EB%9E%98%EC%8B%9C%20%EC%8A%AC%EB%A1%9C%EC%8A%A4%EB%AA%A8%EC%96%B4" target="_blank">
                            <strong>플래시 슬로스모어</strong>
                        </a>
                        <p>나이: 33세</p>
                        <p>닉의 고교 동창이자 최고의 절친</p>
                    </div>
                </div>
                <div class="big-img-wrapper">
                    <img src="nick,flash.jpg" class="big-img">
                    <span class="img-caption">▲ "플래시에게 도움 요청하러 간 장면"</span>
                </div>
            </div>

            <div class="relation-set">
                <div class="relation">
                    <img src="finnick.jpg" class="relation-img">
                    <div class="relation-info">
                        <a href="https://namu.wiki/w/%ED%95%80%EB%8B%89" target="_blank">
                            <strong>핀닉</strong>
                        </a>
                        <p>나이: 34세 이상 (추정)</p>
                        <p>사기꾼 시절부터 함께한 닉의 동업자</p>
                    </div>
                </div>
                <div class="big-img-wrapper">
                    <img src="nick,finnick.jpg" class="big-img">
                    <span class="img-caption">▲ 비즈니스 파트너이자 사막여우 친구 핀닉</span>
                </div>
            </div>

        </section>
    </div>
</body>
</html>
