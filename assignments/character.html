<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주토피아 캐릭터 프로필</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: #333;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        .character-container {
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            padding: 60px; /* 내부 여백 더 넓게 */
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        /* 메인 프로필 (닉 와일드) */
        .profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px; /* 다음 섹션과의 간격 */
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #fff;
            box-shadow: 20px 20px 30px rgba(0, 0, 0, 0.15); /* 강조 그림자 */
            image-rendering: -webkit-optimize-contrast; /* 깨짐 방지 */
        }

        .profile-info {
            text-align: right;
        }

        .profile-info h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, #2ecc71, #f39c12);
            border-radius: 10px;
            margin: 40px 0; /* 선 위아래 간격 넓힘 */
            opacity: 0.6;
        }

        /* 섹션 제목 */
        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        /* 관계 카드 공통 스타일 (주디, 플래시, 핀닉) */
        .relation-section {
            margin-bottom: 100px; /* 각 캐릭터 세트 사이의 큰 간격 */
        }

        .relation-card {
            display: flex;
            align-items: center;
            gap: 50px; /* 사진과 설명 사이 간격을 확 벌림 */
            padding: 40px;
            background: #f9f9f9;
            border-radius: 25px;
            margin-bottom: 40px; /* 카드와 하단 큰 이미지 사이 간격 */
        }

        .relation-img {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 15px 15px 25px rgba(0,0,0,0.1); /* 강조 그림자 */
            image-rendering: -webkit-optimize-contrast; /* 깨짐 방지 */
            flex-shrink: 0; /* 사진 크기 유지 */
        }

        .relation-info a {
            text-decoration: none;
            color: inherit;
        }

        .relation-info strong {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 15px;
            color: #222;
            transition: color 0.2s;
        }

        .relation-info a:hover strong {
            color: #f39c12;
            text-decoration: underline;
        }

        .relation-info p {
            margin: 5px 0;
            color: #666;
            font-size: 1.1rem;
        }

        /* 하단 큰 이미지 */
        .big-img {
            width: 100%;
            height: auto;
            border-radius: 25px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.15); /* 강조 그림자 */
            image-rendering: -webkit-optimize-contrast; /* 깨짐 방지 */
        }

        /* 모바일 대응 */
        @media (max-width: 700px) {
            .profile, .relation-card { flex-direction: column; text-align: center; }
            .profile-info { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="character-container">

        <div class="profile">
            <img src="nick.jpg" alt="닉 와일드" class="profile-img">
            <div class="profile-info">
                <h1>닉 와일드</h1>
                <p>종족: 붉은 여우</p>
                <p>나이: 33세</p>
                <p>주토피아 최초의 여우 경찰</p>
            </div>
        </div>

        <h2>인간 관계 (Allies)</h2>
        <div class="divider"></div>

        <div class="relation-section">
            <div class="relation-card">
                <img src="judy.jpg" alt="주디 홉스" class="relation-img">
                <div class="relation-info">
                    <a href="https://namu.wiki/w/%EC%A3%BC%EB%94%94%20%ED%99%89%EC%8A%A4" target="_blank">
                        <strong>주디 홉스 (Judy Hopps)</strong>
                    </a>
                    <p>나이: 25세</p>
                    <p>함께 사건을 해결하는 파트너.</p>
                </div>
            </div>
            <img src="judynick.jpg" alt="닉과 주디" class="big-img">
        </div>

        <div class="relation-section">
            <div class="relation-card">
                <img src="flash.jpg" alt="플래시" class="relation-img">
                <div class="relation-info">
                    <a href="https://namu.wiki/w/%ED%94%8C%EB%9E%98%EC%8B%9C%20%EC%8A%AC%EB%A1%9C%EC%8A%A4%EB%AA%A8%EC%96%B4" target="_blank">
                        <strong>플래시 슬로스모어 (Flash)</strong>
                    </a>
                    <p>나이: 33세</p>
                    <p>닉의 고교 동창이자 절친</p>
                </div>
            </div>
            <img src="nick_flash.jpg" alt="닉과 플래시" class="big-img">
        </div>

        <div class="relation-section">
            <div class="relation-card">
                <img src="finnick.jpg" alt="핀닉" class="relation-img">
                <div class="relation-info">
                    <a href="https://namu.wiki/w/%ED%95%80%EB%8B%89" target="_blank">
                        <strong>핀닉 (Finnick)</strong>
                    </a>
                    <p>나이: 34세 이상 (추정)</p>
                    <p>전직 동업자, 거친 반전 목소리의 사막여우</p>
                </div>
            </div>
            <img src="nick_finnick.jpg" alt="닉과 핀닉" class="big-img">
        </div>

    </div>

</body>
</html>
