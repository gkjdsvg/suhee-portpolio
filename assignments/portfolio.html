<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 포트폴리오</title>
    <style>
        /* --- 1. 초기화 및 기본 스타일 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-family: 'Malgun Gothic', sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            overflow-x: hidden; /* 가로 스크롤바 절대 방지 */
        }

        /* --- 2. 반응형 레이아웃 핵심 (최대 1920px, 유연한 축소) --- */
        .container {
            width: 100%;
            max-width: 1920px; /* 최대 크기는 1920px로 제한 */
            margin: 0 auto;
            background-color: #ffffff;
        }

        /* 섹션 공통 */
        section {
            width: 100%;
            min-height: 100vh;
            padding: 120px 10% 80px 10%; /* 좌우 여백을 %로 주어 화면 크기에 따라 자동 조절 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        h2 {
            font-size: calc(2rem + 1vw); /* 화면 크기에 따라 글자 크기 유연하게 조절 */
            margin-bottom: 50px;
            color: #222;
            text-align: center;
        }
        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #3498db;
            margin: 15px auto 0 auto;
        }

        /* --- 3. 상단 내비게이션 바 (반응형) --- */
        header {
            width: 100%;
            max-width: 1920px;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            z-index: 1000;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }
        nav {
            display: flex;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: #555;
            font-size: 1rem;
            font-weight: 600;
            transition: color 0.3s;
        }
        nav a:hover, nav a.active {
            color: #3498db;
        }

        /* --- 4. 섹션별 반응형 스타일 --- */
        /* Home 섹션 */
        #home {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            text-align: center;
        }
        #home h1 {
            font-size: calc(2.5rem + 2vw); /* 큰 화면에선 크게, 작은 화면에선 작게 */
            margin-bottom: 20px;
        }
        #home p {
            font-size: calc(1rem + 0.5vw);
            opacity: 0.9;
        }

        /* About 섹션 */
        .about-content {
            max-width: 1000px;
            width: 100%;
            font-size: 1.2rem;
            line-height: 1.8;
        }
        .about-text p {
            margin-bottom: 15px;
        }

        /* Projects 섹션 (Flex-wrap으로 화면 작아지면 아래로 떨어지게 설정) */
        .project-grid {
            display: flex;
            flex-wrap: wrap; /* 자리가 부족하면 다음 줄로 자동 줄바꿈 */
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }
        .project-card {
            flex: 1 1 300px; /* 최소 300px 보장, 남는 공간은 균등 분할 */
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 30px;
            transition: transform 0.3s;
        }
        .project-card:hover {
            transform: translateY(-10px);
        }
        .project-card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #333;
        }

        /* Contact 섹션 */
        #contact {
            text-align: center;
        }
        #contact p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }
        .email-btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        .email-btn:hover {
            background-color: #2980b9;
        }

        /* 푸터 */
        footer {
            width: 100%;
            padding: 30px;
            text-align: center;
            background-color: #222;
            color: #fff;
            font-size: 0.9rem;
        }

        /* --- 5. 모바일 환경 최종 방어 (미디어 쿼리) --- */
        @media (max-width: 768px) {
            header {
                padding: 15px 5%;
            }
            .logo { font-size: 1.2rem; }
            nav { gap: 10px; }
            nav a { font-size: 0.9rem; }
            section { padding: 80px 5% 50px 5%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">PORTFOLIO</div>
            <nav>
                <a href="#home" class="nav-link active">Home</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#contact" class="nav-link">Contact</a>
            </nav>
        </header>

        <main>
            <section id="home">
                <h1>안녕하세요, 홍길동입니다.</h1>
                <p>끊임없이 성장하는 프론트엔드 개발자입니다.</p>
            </section>

            <section id="about">
                <h2>ABOUT ME</h2>
                <div
