<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포트폴리오</title>
    <style>
        /* 기본 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8f8f8; /* 아주 연한 그레이 배경으로 세련미 추가 */
            color: #333;
        }

        /* 블랙 상단 바 */
        header {
            background-color: #000;
            color: #fff;
            padding: 60px 10%; /* 여백을 넉넉히 주어 고급스럽게 */
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 400; /* 너무 두껍지 않은 폰트 */
            letter-spacing: -0.5px;
        }

        /* 메인 콘텐츠 영역 */
        main {
            background-color: #fff;
            max-width: 800px;
            margin: 40px auto;
            padding: 60px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); /* 은은한 그림자 */
        }

        .intro-text {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 80px;
            font-weight: 500;
        }

        /* 리스트 메뉴 스타일 */
        .menu-list {
            list-style: none;
            padding: 0;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10px;
            border-bottom: 1px solid #eee; /* 가느다란 구분선 */
            text-decoration: none;
            color: #333;
            transition: background-color 0.3s; /* 마우스 올렸을 때 아주 살짝 반응 */
        }

        .menu-item:hover {
            background-color: #fafafa;
        }

        .menu-item span {
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* 화살표 모양 (CSS로 구현) */
        .arrow {
            width: 24px;
            height: 24px;
            position: relative;
        }

        .arrow::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-top: 1px solid #000;
            border-right: 1px solid #000;
            transform: rotate(45deg);
            top: 6px;
            right: 5px;
        }

        .arrow::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 1px;
            background-color: #000;
            top: 11px;
            right: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>portpolio</h1>
    </header>

    <main>
        <p class="intro-text">과제들을 소개합니다</p>

        <nav class="menu-list">
            <a href="class5_book.html" class="menu-item">
                <span>html 활용하여 책 소개하기</span>
                <div class="arrow"></div>
            </a>
            <a href="character.html" class="menu-item">
                <span>캐릭터 사이트 제작하기</span>
                <div class="arrow"></div>
            </a>
            <a href="portfolio.html" class="menu-item">
                <span>포트폴리오 웹사이트 제작</span>
                <div class="arrow"></div>
            </a>
        </nav>
    </main>

</body>
</html>
