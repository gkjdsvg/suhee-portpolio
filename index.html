<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심플 포트폴리오</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; line-height: 1.6; scroll-behavior: smooth; }
        
        /* 네비게이션 바 */
        nav { position: fixed; top: 0; width: 100%; background: #fff; border-bottom: 1px solid #eee; z-index: 1000; }
        nav ul { display: flex; justify-content: center; list-style: none; padding: 15px; }
        nav ul li { margin: 0 20px; }
        nav ul li a { text-decoration: none; color: #333; font-weight: bold; }

        /* 섹션 공통 스타일 */
        section { padding: 100px 20px; height: 80vh; border-bottom: 1px solid #f9f9f9; max-width: 900px; margin: 0 auto; }
        h2 { font-size: 2rem; color: #222; border-left: 5px solid #333; padding-left: 15px; }
        
        /* 캐릭터/포트폴리오 그리드 */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: #f4f4f4; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#character">캐릭터 사이트</a></li>
            <li><a href="#book">책 소개</a></li>
            <li><a href="#portfolio">포트폴리오</a></li>
        </ul>
    </nav>

    <section id="character">
        <h2>Character</h2>
        <p>나만의 캐릭터를 소개하는 공간입니다.</p>
        <div class="grid">
            <div class="card">캐릭터 이미지 1</div>
            <div class="card">캐릭터 이미지 2</div>
        </div>
    </section>

    <section id="book">
        <h2>Book Introduction</h2>
        <div style="display: flex; gap: 30px; margin-top: 20px;">
            <div style="flex: 1; background: #ddd; height: 300px;">[책 표지 이미지]</div>
            <div style="flex: 2;">
                <h3>가장 단순한 것이 가장 아름답다</h3>
                <p>저자: 홍길동 | 출판사: 심플북스</p>
                <p>책의 핵심 줄거리나 소개글을 여기에 작성하세요. HTML을 활용해 가독성 있게 배치했습니다.</p>
            </div>
        </div>
    </section>

    <section id="portfolio">
        <h2>Portfolio</h2>
        <p>그동안 작업한 프로젝트 결과물입니다.</p>
        <div class="grid">
            <div class="card">Project A</div>
            <div class="card">Project B</div>
            <div class="card">Project C</div>
            <div class="card">Project D</div>
        </div>
    </section>

</body>
</html>
